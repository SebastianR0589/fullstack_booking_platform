<div style="border: 1px solid #28a745; border-radius: 8px; padding: 20px; background: #f8fff9; max-width: 500px; margin: 0 auto;">
  <h3>Booking for: <span style="color: #28a745;">{{ room.name }}</span></h3>
  
  <form (ngSubmit)="submitBooking()">
    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px;">Check-in Date:</label>
      <input type="date" [(ngModel)]="startDate" name="startDate" required style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
    </div>

    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px;">Check-out Date:</label>
      <input type="date" [(ngModel)]="endDate" name="endDate" required style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
    </div>

    <button type="submit" style="background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 1em;">
      Book Now
    </button>
  </form>

  @if (errorMessage) {
    <div style="margin-top: 15px; padding: 10px; background: #f8d7da; color: #721c24; border-radius: 4px; border: 1px solid #f5c6cb;">
      {{ errorMessage }}
    </div>
  }

  @if (successMessage) {
    <div style="margin-top: 15px; padding: 10px; background: #d4edda; color: #155724; border-radius: 4px; border: 1px solid #c3e6cb;">
      {{ successMessage }}
    </div>
  }
</div>
